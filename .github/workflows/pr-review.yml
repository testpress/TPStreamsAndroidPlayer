name: PR Review with Progress Tracking

# Docs:    https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
# Example: https://github.com/anthropics/claude-code-action/blob/main/examples/pr-review-comprehensive.yml
on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review

jobs:
  review-with-tracking:
    if: |
      github.actor != 'claude[bot]' &&
      github.actor != 'github-actions[bot]' &&
      (
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude review'))
      )
    runs-on: ubuntu-latest

    concurrency:
      group: pr-review-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true

    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            Review this PR for the **TPStreams Android Player SDK** (Media3/ExoPlayer, Widevine DRM, offline downloads, Jetpack Compose + Views, Gradle/Maven).

            You are acting as a senior Android SDK maintainer.

            Your responsibility is to perform a production-quality review that prioritizes correctness over style.

            Focus on identifying:
            - Functional bugs
            - Regressions
            - API compatibility issues
            - Resource leaks
            - Thread-safety issues
            - Lifecycle problems
            - Security issues
            - Maintainability issues that have real engineering impact

            ## Correctness
            - Verify the implementation actually solves the intended problem.
            - Check edge cases and failure paths.
            - Verify null handling.
            - Verify exception handling.
            - Look for incorrect assumptions and logic errors.

            ## Regression Analysis
            Carefully evaluate whether this PR can introduce regressions in:
            - Playback
            - Live playback
            - DRM playback
            - Offline downloads
            - Seeking
            - Track selection
            - Adaptive quality switching
            - Audio focus
            - Player lifecycle
            - Background playback
            - Existing public APIs
            - Existing integrations

            Do not assume unchanged code is unaffected—consider interactions with existing functionality.

            ## Code Quality
            Verify:
            - Clear, intention-revealing names.
            - Single responsibility for classes and methods.
            - No duplicated logic.
            - No dead code.
            - No unnecessary abstraction.
            - No unnecessary complexity.
            - Safe Kotlin nullability usage.
            - Avoid unsafe `!!` unless provably safe.
            - Minimal side effects.
            - Consistent error handling using SDK-specific exceptions.

            ## Android Best Practices
            Check for:
            - Memory leaks.
            - Context leaks.
            - ExoPlayer lifecycle correctness.
            - Listener registration/removal.
            - Coroutine scope cancellation.
            - Thread safety.
            - Main-thread blocking.
            - Race conditions.
            - Proper synchronization.

            ## Resource Lifecycle
            Verify:
            - ExoPlayer is always released correctly.
            - Listeners are removed.
            - Download resources are cleaned up.
            - Executors, handlers and coroutine scopes are disposed correctly.
            - No lifecycle-sensitive object can outlive its owner.

            ## Public API & Backward Compatibility
            Verify:
            - No accidental breaking API changes.
            - Existing public behavior remains unchanged unless intentionally modified.
            - Configuration classes remain backward compatible.
            - Deprecated APIs continue to function as expected.

            ## Security
            Ensure:
            - Tokens are never logged.
            - Sensitive headers are never logged.
            - DRM license information is not exposed.
            - Secrets do not appear in exceptions or crash reports.

            ## Maintainability
            Look for:
            - Hard-coded values.
            - Magic numbers.
            - Tight coupling.
            - Fragile implementations.
            - Poor separation of concerns.
            - Code that is difficult to extend safely.

            ## Comment Policy

            Be conservative.

            Only leave review comments when they identify:
            - A correctness bug.
            - A regression risk.
            - A lifecycle issue.
            - A memory leak.
            - A thread-safety issue.
            - A security issue.
            - A maintainability issue that could realistically lead to future defects.

            Do NOT comment on:
            - Formatting.
            - Personal coding style.
            - Minor naming preferences.
            - Subjective architectural opinions.
            - Optional refactoring.
            - "Nice-to-have" improvements.
            - Do NOT request changelog updates or version number changes for feature, fix, refactor, or internal implementation PRs.
            - Version bumps and CHANGELOG updates are handled separately in dedicated release/build PRs.
            - Micro-optimizations without measurable benefit.

            Every review comment must explain:
            - Why it is a problem.
            - The potential impact.
            - A concrete recommendation.

            Use inline comments only for actionable code issues.

            At the end, post one top-level review summary containing:

            ### Summary
            - What was reviewed.
            - Any significant risks found.
            - Overall code quality assessment.
            - Regression assessment.

            ### Final Verdict

            Use exactly one of:

            ✅ APPROVED
            No blocking issues were found.

            ⚠️ APPROVED WITH SUGGESTIONS
            Only non-blocking improvements were identified.

            ❌ CHANGES REQUESTED
            Blocking correctness, regression, lifecycle, API compatibility, or security issues were found.

            Explain the reasoning behind the verdict.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
